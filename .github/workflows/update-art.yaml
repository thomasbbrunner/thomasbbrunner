name: Update Art

on:
  # Triggers the workflow at 02:00 UTC every day.
  # TODO re-enable
  # schedule:
  #   - cron: '0 2 * * *'

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

jobs:
  update-and-commit:
    runs-on: ubuntu-latest
    permissions:
      # Required to push changes to the repository
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run script
        run: uv run main.py

      # TODO this is failing
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add last_updated.txt
          
          # Check for changes. The 'git diff' command will exit with 1 if there are staged changes.
          # We use '|| exit 0' to prevent the workflow from failing if there are no changes.
          git diff --staged --quiet || (git commit -m "Automated update: Update last_updated.txt" && git push)
          
          echo "Changes committed and pushed if there were any."
